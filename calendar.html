<!doctype html>
<html lang="zh-CN">
  <head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><meta name="description" content="CampusBiz AI 一周运营日历，为校园周边商家生成周一到周日的内容发布计划。" /><title>CampusBiz AI - 一周运营日历</title><link rel="stylesheet" href="styles.css" /></head>
  <body data-page="calendar">
    <header class="site-header"><nav class="nav" aria-label="主导航"><a class="brand" href="index.html"><span class="brand-mark">AI</span><span>CampusBiz AI</span></a><div class="nav-links"><a href="index.html" data-page="home">首页</a><a href="dashboard.html" data-page="dashboard">仪表盘</a><a href="calendar.html" data-page="calendar">运营日历</a><a href="reply.html" data-page="reply">评论回复</a><a href="cases.html" data-page="cases">案例库</a><a href="research.html" data-page="research">用户验证</a><a href="workflow.html" data-page="workflow">AI 工作流</a><a href="pricing.html" data-page="pricing">定价方案</a><a href="product-plan.html" data-page="plan">产品方案</a><a href="faq.html" data-page="faq">常见问题</a><a href="privacy.html" data-page="privacy">隐私说明</a><a href="https://github.com/zheng1yu1/campusbiz-ai-assistant">GitHub</a></div></nav></header>
    <main><section class="section page-title"><p class="eyebrow">一周运营日历</p><h1>把活动拆成一周发布计划</h1><p>输入本周主推产品，生成周一到周日的内容主题、平台和执行建议。输出为模拟数据。</p></section>
      <section class="section workbench"><form id="calendar-form" class="input-panel" novalidate><div class="sample-tabs"><button type="button" class="secondary-btn" data-calendar-example="tea">奶茶店新品周</button><button type="button" class="secondary-btn" data-calendar-example="dinner">饭店周末套餐</button><button type="button" class="secondary-btn" data-calendar-example="print">打印店开学季</button></div><div id="calendarError" class="error-message"></div><label for="calendarStoreType">店铺类型<select id="calendarStoreType"><option>奶茶店</option><option>饭店</option><option>理发店</option><option>健身房</option><option>水果店</option><option>打印店</option></select></label><label for="calendarGoal">活动目标<select id="calendarGoal"><option>拉新</option><option>复购</option><option>推新品</option><option>清库存</option><option>提升评价</option><option>节日活动</option></select></label><label for="calendarProduct">本周主推产品<input id="calendarProduct" placeholder="例如：桂花乌龙新品周" /></label><label for="calendarFrequency">发布频率<select id="calendarFrequency"><option>低频</option><option>中频</option><option>高频</option></select></label><label for="calendarWeekend">是否有周末活动<select id="calendarWeekend"><option>是</option><option>否</option></select></label><button class="primary-btn" type="submit">生成一周运营计划</button></form><section class="output-panel calendar-output print-area"><div class="output-head no-print"><div><p class="eyebrow">生成结果</p><h2>周一到周日计划</h2></div><div class="actions"><button class="secondary-btn" data-copy-calendar type="button">复制整周计划</button><button class="secondary-btn" data-download-calendar type="button">下载计划 TXT</button><button class="secondary-btn" data-print type="button">打印计划</button></div></div><div id="calendarOutput" class="empty-state">填写信息后生成一周运营计划。</div></section></section>
    </main><footer class="site-footer"><div class="footer-inner"><div><strong>CampusBiz AI</strong><span>项目定位：静态 AI 产品 MVP · 版本号：v1.0</span></div><div class="footer-links"><a href="https://zheng1yu1.github.io/campusbiz-ai-assistant/">Demo 链接</a><a href="https://github.com/zheng1yu1/campusbiz-ai-assistant">GitHub 链接</a></div></div></footer><div class="toast" id="toast" role="status" aria-live="polite"></div><script src="script.js"></script>
  </body>
</html>
